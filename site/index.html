<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌲 campseek — 자연휴양림 빈자리 조회</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <h1>🌲 campseek</h1>
    <p class="sub">숲나들e 자연휴양림 · 숲속의 집 &amp; 야영장 빈자리 조회</p>
  </header>

  <main>
    <section class="card">
      <h2>빈자리 조회</h2>
      <div class="grid">
        <label>지역
          <select id="region"></select>
        </label>
        <label>시설
          <select id="section"></select>
        </label>
        <label>날짜(주말)
          <select id="date"></select>
        </label>
        <label class="chk">
          <input type="checkbox" id="availableOnly" checked /> 예약가능만 보기
        </label>
        <div class="actions">
          <button type="button" id="searchBtn">🔍 조회</button>
          <button type="button" id="refreshBtn" class="secondary" title="숲나들e를 지금 다시 조회합니다">🔄 지금 업데이트</button>
        </div>
      </div>
      <p id="refreshMsg" class="meta refresh-msg"></p>
      <p id="meta" class="meta">불러오는 중…</p>
      <div id="results"></div>
    </section>
  </main>

  <footer>
    <p id="foot">데이터 출처: 숲나들e (foresttrip.go.kr) · 예약은 숲나들e에서 진행 ·
    <a href="https://github.com/heekeunlee/campseek">GitHub</a></p>
    <p class="contact">문의 : 이희근 010-8949-0984, 문제시 삭제</p>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
