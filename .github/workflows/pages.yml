name: campseek check & deploy

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다 (UTC 기준, GitHub 사정으로 지연될 수 있음)
  push:
    branches: [main]
  workflow_dispatch: {}       # 수동 실행 버튼

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "[진단] 숲나들e 연결 테스트"
        run: |
          echo "--- curl (IPv4) ---"
          curl -4 -sS -m 25 -o /dev/null -w "http=%{http_code} time=%{time_total}s\n" \
            -A "Mozilla/5.0" "https://www.foresttrip.go.kr/rep/or/selectSiDoList.do" || echo "curl failed: $?"
          echo "--- node fetch ---"
          node -e "fetch('https://www.foresttrip.go.kr/rep/or/selectSiDoList.do',{headers:{'User-Agent':'Mozilla/5.0'}}).then(r=>console.log('node http',r.status)).catch(e=>console.log('node err:',e.message,'| cause:',e.cause&&(e.cause.code||e.cause.message)))"
        continue-on-error: true

      - name: 빈자리 조회 + 알림 + 대시보드 데이터 생성
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: node scripts/snapshot.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
