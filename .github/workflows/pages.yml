name: deploy dashboard to Pages

# 조회는 GitHub 러너에서 숲나들e가 차단되므로 여기서 하지 않습니다.
# 로컬 스케줄러(scripts/publish.sh)가 site/data/availability.json 을 갱신·푸시하면
# 이 워크플로가 정적 대시보드(site/)를 Pages 로 배포만 합니다.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
